# Web server port for the REST API.
server.port=8080

# Oracle database connection used by Spring Data JPA.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=pkc_user
spring.datasource.password=pkc_password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA/Hibernate settings. Hibernate maps Java entity classes to database tables.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Shows detailed logs for this project's Java package.
logging.level.com.oraclequantapi=DEBUG
