# ============================================================
# MARYAM Measurement API - Application Configuration
# ============================================================
spring.application.name=maryam-measurement-api
server.port=8080
server.servlet.context-path=/maryam

# ------------------------------------------------------------
# Oracle XE Datasource
# ------------------------------------------------------------
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=SYSTEM
spring.datasource.password=Test1234
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=MaryamHikariPool

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Swagger / OpenAPI - compact, low-fuss presentation
# ------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.docExpansion=none
springdoc.swagger-ui.defaultModelsExpandDepth=-1
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.supportedSubmitMethods=get,post,put,patch,delete

# ------------------------------------------------------------
# Actuator
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
info.app.name=MARYAM Measurement Conversion API
info.app.version=1.0.0

# ------------------------------------------------------------
# Logging - rolling file appender configured in logback-spring.xml
# ------------------------------------------------------------
logging.config=classpath:logback-spring.xml
