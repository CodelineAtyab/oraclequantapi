spring:
  datasource:
    # TODO: Replace with your Oracle DB connection URL
    # Example: jdbc:oracle:thin:@//prod-db.company.com:1521/ORCLPDB1
    url: jdbc:oracle:thin:@//your-host:1521/your-service
    # TODO: Replace with your Oracle DB username
    # Example: QUANT_USER
    username: YOUR_DB_USERNAME
    # TODO: Replace with your Oracle DB password
    # Example: Str0ngP@ssw0rd!
    password: YOUR_DB_PASSWORD
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      # TODO: Change to 'validate' or 'update' once DB is live; never use 'create-drop' in production
      ddl-auto: none
    show-sql: false
    open-in-view: false
